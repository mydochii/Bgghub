<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn.videy.co/4UfBBfE91.mp4","📍M4L4M T3R454 4N3H K4R3N4 S3MV4 B3RVJ0NG C3P4T"],
  ["https://cdn.videy.co/4mrU5xWM1.mp4","📍K3P1NCVT T1B4 T1B4 M3MBV4T J4NTVNG B3RD3B4R"],
  ["https://cdn.videy.co/5ecipD9p1.mp4","📍D14M D14M S1TV451 J4D1 S3M4K1N T4K J3L45"],
  ["https://cdn.videy.co/5nGCpVcF1.mp4","📍T4NT3 M3L1R1K S44T K0ND151 M4K1N P4N45"],
  ["https://cdn.videy.co/6vDjEMbt1.mp4","📍S4L4H W4KT0 D4N S4L4H K0ND151 J4D1 P4N1K"],
  ["https://cdn.videy.co/6YskBYvk1.mp4","📍M4NT4N M3MBV4T SV45N4 M4L4M J4D1 B3RB3D4"],
  ["https://cdn.videy.co/6y6PMWv91.mp4","📍D1 K4M4R T3RTVTVP S3MV4 T3R454 L3B1H D3K4T"],
  ["https://cdn.videy.co/74lNqRRK1.mp4","📍K3J4D14N K3C1L Y4NG M3MBV4T P1K1R4N K4CVV"],
  ["https://cdn.videy.co/7R4Vekcc1.mp4","📍T4NT3 D14M D14M M3MBV4T 51NY4L Y4NG 4N3H"],
  ["https://cdn.videy.co/7RW2A7vB1.mp4","📍M4L4M H3N1NG J4D1 S4K51 K3J4D14N T4K B1454"],
  ["https://cdn.videy.co/7ULt71Dv1.mp4","📍K3P1NCVT 4W4LNY4 R1NG4N T4P1 J4D1 B3R4T"],
  ["https://cdn.videy.co/7yhw0v7I1.mp4","📍S4L4H L1H4T M3MBV4T K0ND151 J4D1 T3G4NG"],

  ["https://cdn.videy.co/9NAhs7421.mp4","📍M4L4M P4NJ4NG M3MBV4T P1K1R4N T4K T3N4NG"],
  ["https://cdn.videy.co/9PxJZHJd1.mp4","📍K3J4D14N 1TV M3NGVB4H C4R4 P4ND4NG S3MV4NY4"],
  ["https://cdn.videy.co/9ZSZO1Jt1.mp4","📍T4NT3 T3R454 L3B1H B3R4N1 D4R1 S3B3LVNY4"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
